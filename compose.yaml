services:
  pgvector:
    image: 'pgvector/pgvector:pg17'
    environment:
      - 'POSTGRES_DB=greenaiproxy'
      - 'POSTGRES_PASSWORD=dev'
      - 'POSTGRES_USER=dev'
    labels:
      - "org.springframework.boot.service-connection=postgres"
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      # ':z' relabels the file for SELinux (needed on Fedora/RHEL, harmless elsewhere)
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d greenaiproxy"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: 'ollama/ollama:latest'
    labels:
      - "org.springframework.boot.service-connection=ollama"
    ports:
      - '11434:11434'
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  ollama: