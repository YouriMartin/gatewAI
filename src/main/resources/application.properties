spring.application.name=gatewai

# Virtual Threads
spring.threads.virtual.enabled=true

# --- Model auto-configuration ---
# Chat egress is built by EgressProviderConfiguration from gatewai.providers.*
# below — the provider chat auto-configs are excluded so that NO vendor is
# privileged or required. Only the Ollama embedding auto-config stays on: the
# semantic cache always embeds locally (nomic-embed-text).
spring.autoconfigure.exclude=\
  org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,\
  org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration,\
  org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
# (Last exclude above) Auth is API-key based (ApiKeyAuthenticationFilter); we
# don't use Spring's default in-memory user. Excluding it removes the misleading
# "Using generated security password" log — that UUID is NOT the API key.

# --- Egress provider instances (gatewai.providers.<name>) ---
# Each instance is one connection the gateway can dispatch to; model-registry
# entries below reference an instance by name. Only instances actually
# referenced by the registry are built at startup, so unused ones need no
# credentials. Types: anthropic | openai | openai-compatible | ollama.
gatewai.providers.ollama.type=ollama
gatewai.providers.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}

# Cloud instances — declared but dormant until a registry entry references them.
gatewai.providers.anthropic.type=anthropic
gatewai.providers.anthropic.api-key=${ANTHROPIC_API_KEY:}
gatewai.providers.openai.type=openai
gatewai.providers.openai.api-key=${OPENAI_API_KEY:}

# Any server speaking the OpenAI wire format works too (vLLM, LM Studio,
# llama.cpp, OpenRouter, Azure OpenAI…), and extra Ollama servers are just more
# instances:
#gatewai.providers.vllm.type=openai-compatible
#gatewai.providers.vllm.base-url=http://gpu-box:8000/v1
#gatewai.providers.ollama-gpu.type=ollama
#gatewai.providers.ollama-gpu.base-url=http://gpu-host:11434

# Bootstrap admin API key (Phase 5.1). When set, an admin client is seeded with
# this exact key at startup (idempotent) — use it as your Bearer token. Leave
# blank to fall back to a random key logged once at first start. Prefix it with
# 'gw_' for consistency.
gatewai.admin.api-key=${GATEWAI_ADMIN_API_KEY:}

# Ollama — local embeddings for the semantic cache (nomic-embed-text, 768d),
# pulled at startup (when_missing). Chat models are NOT configured here: they
# come from the registry below and are pulled per provider instance.
spring.ai.ollama.embedding.options.model=nomic-embed-text
spring.ai.ollama.init.pull-model-strategy=when_missing
spring.ai.ollama.init.embedding.additional-models=nomic-embed-text

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update

# pgvector (semantic cache + metrics — same database)
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.index-type=hnsw
spring.ai.vectorstore.pgvector.distance-type=cosine_distance

# Semantic cache
gatewai.cache.similarity-threshold=0.92
gatewai.cache.top-k=1
gatewai.cache.ttl-minutes=0
gatewai.cache.client-namespacing=true

# Model registry — LOCAL-FIRST by default: the gateway is fully usable with
# zero API keys. Three Qwen sizes cover the three routing tiers; the first run
# pulls them into Ollama (~3 GB total, one-time). For frontier-model quality on
# the premium tier, swap in a cloud entry (example below).
#
# provider = a gatewai.providers.<name> instance above.
# tier = routing class (local | cloud-entry | cloud-premium). The names are
#   capability classes, not locations — entry/premium tiers may be local models,
#   as they are by default. Routing picks the FIRST entry declared per tier, so
#   to repoint a tier, replace its entry rather than adding a second one.
# model-id must be unique across the registry (dispatch resolves by id).
# cost-per-1k-tokens = rough blended (input+output)/2 list price, in the billing
#   currency (0 for self-hosted). energy-intensity = estimated kWh per 1k tokens
#   (energy only, NOT carbon; carbon = energy-intensity x grid intensity). No
#   provider publishes official per-inference energy; these are rough
#   placeholders preserving the order premium > entry > local.
gatewai.models.registry.local-small.provider=ollama
gatewai.models.registry.local-small.model-id=qwen2.5:0.5b
gatewai.models.registry.local-small.cost-per-1k-tokens=0.0
gatewai.models.registry.local-small.energy-intensity=0.0005
gatewai.models.registry.local-small.tier=local

gatewai.models.registry.local-medium.provider=ollama
gatewai.models.registry.local-medium.model-id=qwen2.5:1.5b
gatewai.models.registry.local-medium.cost-per-1k-tokens=0.0
gatewai.models.registry.local-medium.energy-intensity=0.001
gatewai.models.registry.local-medium.tier=cloud-entry

gatewai.models.registry.local-large.provider=ollama
gatewai.models.registry.local-large.model-id=qwen2.5:3b
gatewai.models.registry.local-large.cost-per-1k-tokens=0.0
gatewai.models.registry.local-large.energy-intensity=0.002
gatewai.models.registry.local-large.tier=cloud-premium

# Cloud opt-in example — Claude as the premium tier: set ANTHROPIC_API_KEY,
# comment out the local-large entry above and uncomment this one. Any provider
# instance works the same way (model ids verified 2026-06-28: premium =
# claude-opus-4-8, cheaper premium = claude-sonnet-4-6, entry = claude-haiku-4-5).
#gatewai.models.registry.claude-premium.provider=anthropic
#gatewai.models.registry.claude-premium.model-id=claude-opus-4-8
#gatewai.models.registry.claude-premium.cost-per-1k-tokens=0.015
#gatewai.models.registry.claude-premium.energy-intensity=0.005
#gatewai.models.registry.claude-premium.tier=cloud-premium

# Carbon model (Phase 4.1)
# Static grid carbon intensity (gCO2-eq/kWh), used as default and as fallback.
# ~230 ~= a typical European grid average; e.g. France ~56, world ~480.
gatewai.carbon.grid-intensity-grams-per-kwh=230.0

# Real-time carbon intensity via ElectricityMaps (Phase 4.2)
# Disabled by default => StaticCarbonIntensityProvider is used. Enable and set a
# token to fetch live values; on any API error it falls back to the static value.
gatewai.carbon.electricity-maps.enabled=false
gatewai.carbon.electricity-maps.base-url=https://api.electricitymap.org/v3
gatewai.carbon.electricity-maps.zone=FR
gatewai.carbon.electricity-maps.token=${ELECTRICITY_MAPS_TOKEN:}

# Static per-zone intensities (gCO2-eq/kWh) for offline geo routing demos.
# Used by the default provider when ElectricityMaps is disabled.
gatewai.carbon.zone-intensities.FR=56
gatewai.carbon.zone-intensities.SE=30
gatewai.carbon.zone-intensities.DE=380
gatewai.carbon.zone-intensities.PL=650

# Carbon-aware deferred dispatch (Phase 4.4)
# Disabled by default: async endpoint queues jobs, worker runs only when enabled.
gatewai.dispatch.enabled=false
gatewai.dispatch.poll-interval-ms=5000
gatewai.dispatch.candidate-zones=FR,SE,DE,PL

# Complexity classifier (router)
# strategy=embedding (default: semantic routes, local embedding, multilingual),
# heuristic (zero cost: length + keywords) or llm (cheap model + structured output)
gatewai.classifier.strategy=embedding
# Minimum cosine similarity for a semantic route match; below it the heuristic
# decides. Default routes (bilingual EN/FR examples) are defined in
# ClassifierProperties; override via gatewai.classifier.routes[0].name=...,
# .routes[0].tier=..., .routes[0].examples[0]=... or the admin API/dashboard.
gatewai.classifier.route-similarity-threshold=0.60
# model-id blank => cheapest cloud-entry model from the registry above
gatewai.classifier.model-id=
gatewai.classifier.temperature=0.0
gatewai.classifier.fallback-to-heuristic=true

# Rate limiting per API client (Phase 6.2) — POSTs to /v1/chat/completions*
gatewai.ratelimit.enabled=true
gatewai.ratelimit.requests-per-minute=60

# MCP server exposure (Phase 6.4)
# Exposes the gateway as a Model Context Protocol server over WebMVC. The
# streamable-HTTP endpoint defaults to POST /mcp; clients authenticate with the
# same Bearer API key as /v1/** (see SecurityConfig). Set enabled=false to opt out.
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=gatewai-green-proxy
spring.ai.mcp.server.version=0.1.0
spring.ai.mcp.server.instructions=Green AI gateway: cost/carbon-aware routing, \
  semantic cache and CSRD-grade green accounting. Use 'routed_chat' to complete \
  prompts through the gateway, 'green_report' for aggregated cost and gCO2, and \
  'carbon_intensity' for the current grid intensity.

# Actuator + observability (Phase 6.1)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
# Common tag on every meter (handy in Grafana for multi-instance setups)
management.metrics.tags.application=gatewai
# Latency histogram buckets for the request timer
management.metrics.distribution.percentiles-histogram.gatewai.request.latency=true