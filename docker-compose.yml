# Plug & play full stack (Phase 6.5): gateway + PostgreSQL/pgvector + Ollama.
# Local-first: works with ZERO API keys — all three routing tiers run on Ollama.
#
#   cp .env.example .env      # optional: cloud keys, admin key
#   docker compose up --build
#
# Dashboard:    http://localhost:8080/
# OpenAI API:   http://localhost:8080/v1/chat/completions
# MCP server:   http://localhost:8080/mcp
# Health:       http://localhost:8080/actuator/health
#
# On first start the gateway pulls the embedding model (nomic-embed-text) and
# the three default chat models (qwen2.5 0.5b/1.5b/3b, ~3 GB total) into Ollama,
# so the very first boot takes a while. The bootstrap admin API key is printed
# once in the gateway logs — copy it from `docker compose logs`.
#
# Note: `compose.yaml` (infra only) is what Spring Boot auto-starts during local
# `./mvnw spring-boot:run`; this file runs the whole stack in containers instead.

services:
  pgvector:
    image: 'pgvector/pgvector:pg17'
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-greenaiproxy}'
      - 'POSTGRES_USER=${POSTGRES_USER:-dev}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dev}'
    volumes:
      - pgdata:/var/lib/postgresql/data
      # ':z' relabels the file for SELinux (needed on Fedora/RHEL, harmless elsewhere)
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev} -d ${POSTGRES_DB:-greenaiproxy}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: 'ollama/ollama:latest'
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: .
    image: 'gatewai:latest'
    depends_on:
      pgvector:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      # Bundled compose support is for local dev only — off inside the container.
      - 'SPRING_DOCKER_COMPOSE_ENABLED=false'
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://pgvector:5432/${POSTGRES_DB:-greenaiproxy}'
      - 'SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-dev}'
      - 'SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-dev}'
      # Embeddings (Spring AI auto-config) and chat egress (gatewai.providers)
      # both point at the bundled Ollama service.
      - 'SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434'
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      # Optional cloud egress — only used if a registry tier references it.
      - 'ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}'
      - 'OPENAI_API_KEY=${OPENAI_API_KEY:-}'
      - 'GATEWAI_ADMIN_API_KEY=${GATEWAI_ADMIN_API_KEY:-}'
    ports:
      - '8080:8080'

volumes:
  pgdata:
  ollama:
