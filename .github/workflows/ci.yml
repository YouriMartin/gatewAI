name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # Fast quality gate: unit tests + Checkstyle + SpotBugs (no Node, no infra).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Verify (tests + Checkstyle + SpotBugs)
        run: ./mvnw -B -DskipFrontend verify

  # Full-context boot: catches bean-wiring regressions (Phase 7.3). Runs the
  # @Tag("integration") suite against real Postgres + Ollama service containers.
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: greenaiproxy
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev -d greenaiproxy"
          --health-interval 5s --health-timeout 5s --health-retries 10
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Wait for Ollama and pull the embedding model
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost:11434/api/version && break || sleep 2
          done
          echo "pulling nomic-embed-text"
          curl -fsS http://localhost:11434/api/pull -d '{"name":"nomic-embed-text"}' -o /dev/null
      - name: Integration tests (full context boot)
        # GATEWAI_SMOKE_MODEL is intentionally unset → the provider-calling smoke
        # test is skipped (@EnabledIfEnvironmentVariable). The context still loads
        # with zero API keys (local-first egress); chat-model pulls are disabled so
        # CI does not download the ~3 GB default Qwen models it never calls.
        env:
          SPRING_DOCKER_COMPOSE_ENABLED: 'false'
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/greenaiproxy
          SPRING_DATASOURCE_USERNAME: dev
          SPRING_DATASOURCE_PASSWORD: dev
          SPRING_AI_OLLAMA_BASE_URL: http://localhost:11434
          GATEWAI_PROVIDERS_OLLAMA_PULLMODELSTRATEGY: 'never'
        run: ./mvnw -B -Pit test
